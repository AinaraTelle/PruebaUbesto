name: maven-site-integration

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite lanzarlo a mano desde GitHub

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Bajamos vuestro código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Ponemos Java 21 (según tu ejemplo)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. LANZAR TESTS (Aquí Spring levanta H2 solo)
      # Ejecutamos tests unitarios y generamos el reporte de JaCoCo que ya tienes
        #  1- Cobertura (JaCoCo) + Tests Unitarios
      - name: Run tests with JaCoCo
        run: mvn clean test jacoco:report
        working-directory: ./ubesto
          # Si tu pom.xml está en una carpeta, añade: working-directory: ./ubesto

        #  2- Tests de Rendimiento
      - name: Run performance tests
        run: mvn -Pperformance integration-test
        continue-on-error: true # Para que si falla el tiempo de respuesta, el pipeline siga
      
        #  3- Tests de Integración (Aceptación)
      - name: Run Integration Tests
        run: mvn test -Pintegration
        working-directory: ./ubesto
        
      # 4. GENERAR SITE (Opcional, si queréis la web de Maven)
      - name: Generate Maven site
        run: mvn site
        working-directory: ./ubesto

      # 5. DESPLEGAR REPORTES A GITHUB PAGES
      # Esto subirá vuestro reporte de cobertura a la web de vuestro repo
      - name: Deploy Reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/jacoco # Subimos directamente el reporte de JaCoCo
          publish_branch: gh-pages
