
# Nombre del flujo de trabajo
name: Java CI con Maven, H2 y JaCoCo

# 1. PARTE: DISPARADORES (Triggers)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 2. PARTE: DEFINICIÓN DEL TRABAJO Y ENTORNO
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 3. PARTE: LOS PASOS (Steps)
    steps:
    # Paso A: Clonar el repositorio
    - name: Copiar código del repositorio
      uses: actions/checkout@v4

    # Paso B: Configurar el entorno de Java
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # Optimización de velocidad

    # Paso C: Ejecución de la lógica de construcción y testing
    - name: Compilar y Ejecutar Tests con Maven
      run: mvn test

    # Paso D: Guardar resultados como artefactos de GitHub
    - name: Subir Reporte de Cobertura JaCoCo
      if: always() # Obliga a que se ejecute aunque algún test falle
      uses: actions/upload-artifact@v4
      with:
        name: reporte-cobertura
        path: target/site/jacoco/
